name: Deploy Static Site to GitHub Pages

# Trigger the workflow on push to the main branch or manual dispatch
on:
  push:
    branches: ["main"] # Change to "master" if that is your default branch
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

# Set permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Adjust to your specific pnpm version if necessary

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Adjust to your required Node.js version
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build static site
        run: pnpm run build:static

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANT: Change './dist' to your actual build output directory (e.g., './build', './out')
          path: './dist' 

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
